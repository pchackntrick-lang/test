# Install deps + syntax check. Does NOT start the Telegram bot.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirement.txt

      - name: chmod +x bgmi (if present)
        run: |
          if [ -f bgmi ]; then chmod +x bgmi; fi

      - name: Byte-compile (syntax check)
        run: python -m py_compile m.py keep_alive.py watcher.py
